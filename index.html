<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>报销材料生成器（本地版）</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Microsoft YaHei",sans-serif;background:#eef2f7;min-height:100vh}
.container{max-width:640px;margin:0 auto;padding:16px 12px 60px}
h1{text-align:center;font-size:22px;color:#1a3a5c;padding:16px 0 4px}
.sub{text-align:center;font-size:12px;color:#999;margin-bottom:14px}
.note{background:#fffde7;border:1px solid #ffe082;border-radius:8px;padding:10px 14px;font-size:12px;color:#888;margin-bottom:12px}
.card{background:#fff;border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,.07);padding:16px 14px;margin-bottom:10px}
.sec{font-size:12px;font-weight:700;color:#fff;background:#1a3a5c;padding:5px 10px;border-radius:5px;margin-bottom:10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 12px}
.full{grid-column:1/-1}
label{display:block;font-size:11px;color:#666;margin-bottom:3px}
label span{color:#e53e3e}
input,textarea,select{padding:8px 10px;border:1.5px solid #cdd5e3;border-radius:6px;font-size:13px;font-family:inherit;width:100%;background:#fafbfc;outline:none}
input:focus,textarea:focus{border-color:#1a3a5c;background:#fff}
textarea{min-height:56px;resize:vertical}
.radio-group{display:flex;gap:12px;padding:4px 0}
.radio-group label{display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer}
.radio-group input{width:auto}
.btn{background:#1a3a5c;color:#fff;border:none;padding:13px 24px;font-size:15px;font-weight:700;border-radius:40px;cursor:pointer;width:100%;margin-top:14px;font-family:inherit}
.btn:hover{background:#2a5a8c}
.btn:disabled{background:#aaa;cursor:not-allowed}
.msg{background:#e8f5e9;border:1px solid #a5d6a7;border-radius:10px;padding:14px;margin-top:14px;font-size:13px;color:#2e7d32;display:none}
.msg.show{display:block}
.err{background:#ffebee;border:1px solid #ef9a9a;border-radius:10px;padding:14px;margin-top:14px;font-size:13px;color:#c62828;display:none}
.err.show{display:block}
.info{font-size:11px;color:#888;margin-top:8px;text-align:center}
</style>
</head>
<body>
<div class="container">
  <h1>📋 报销材料生成器</h1>
  <p class="sub">填一次信息 → 生成 4 份 DOCX 文件</p>
  <div class="note">💡 纯本地运行，无需网络。文件直接在浏览器生成并下载。</div>

  <div class="card">
    <div class="sec">👤 通用信息</div>
    <div class="grid">
      <div class="full"><label>姓名 <span>*</span></label><input id="name" placeholder="如：潘骅"></div>
      <div class="full"><label>部门 <span>*</span></label><input id="dept" placeholder="如：招商发展部"></div>
      <div class="full"><label>申请日期 <span>*</span></label><input type="date" id="date"></div>
      <div class="full"><label>出差事由 <span>*</span></label><input id="reason" placeholder="如：商务考察"></div>
    </div>
  </div>

  <div class="card">
    <div class="sec">🚄 差旅信息</div>
    <div class="grid">
      <div class="full"><label>出差地点</label><input id="dest" placeholder="如：南京"></div>
      <div><label>随行人数</label><input id="participants" placeholder="如：3"></div>
      <div><label>出差天数</label><input id="days" placeholder="如：2"></div>
      <div><label>出发日期</label><input type="date" id="start_date"></div>
      <div><label>返回日期</label><input type="date" id="end_date"></div>
    </div>
  </div>

  <div class="card">
    <div class="sec">💰 费用信息</div>
    <div class="grid">
      <div class="full"><label>费用内容说明</label><textarea id="detail" placeholder="如：2025.6.15招待南京医药集团领导，地点：南京金陵饭店，共5人"></textarea></div>
      <div><label>金额（元）</label><input id="amount" placeholder="如：1362"></div>
    </div>
  </div>

  <div class="card">
    <div class="sec">🤝 接待审批</div>
    <div class="grid">
      <div class="full"><label>来客单位</label><input id="guest" placeholder="如：南京医药集团"></div>
      <div><label>来客人数</label><input id="guest_count" placeholder="如：5"></div>
      <div><label>来访日期</label><input type="date" id="visit_date"></div>
      <div class="full"><label>陪同人员</label><input id="escort" placeholder="如：李百军、潘骅"></div>
      <div class="full"><label>就餐地点</label><input id="venue" placeholder="如：江南艺库（圆融店）"></div>
      <div><label>人均标准</label><input id="budget" placeholder="如：150"></div>
      <div class="full">
        <label>接待类别</label>
        <div class="radio-group">
          <label><input type="radio" name="meal" value="早餐"> 早餐</label>
          <label><input type="radio" name="meal" value="午餐"> 午餐</label>
          <label><input type="radio" name="meal" value="晚餐" checked> 晚餐</label>
        </div>
      </div>
    </div>
  </div>

  <button class="btn" id="btn" onclick="gen()">🚀 生成 4 份报销文档</button>
  <div class="msg" id="msg"><strong>✅ 生成完成！</strong><br>4 个 DOCX 文件已自动下载。</div>
  <div class="err" id="err"></div>
  <p class="info">用 Microsoft Word 打开生成的 DOCX 文件</p>
</div>

<script>
// ══════════════════════════════════════════════
//  DOCX 生成器（无依赖，纯 JS 实现）
// ══════════════════════════════════════════════
var J = {}; // docx builder namespace

// 简单 XML 构建
J.xml = function(tag, attrs, children) {
  var s = "<" + tag;
  for (var k in attrs) s += " " + k + '="' + J.esc(attrs[k]) + '"';
  if (children === "" || children === null || children === undefined) {
    s += "/>";
  } else {
    s += ">" + children + "</" + tag + ">";
  }
  return s;
};
J.esc = function(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
};

// 日期格式化
function fd(s, fmt) {
  if (!s) { var d = new Date(); } else { var d = new Date(s); if (isNaN(d)) d = new Date(); }
  var y = d.getFullYear(), m = d.getMonth()+1, day = d.getDate();
  if (fmt === "short") return y + "." + String(m).padStart(2,"0") + "." + String(day).padStart(2,"0");
  return y + "年" + m + "月" + day + "日";
}

// 金额中文大写
function acn(n) {
  n = parseFloat(n) || 0;
  var CN = "零壹贰叁肆伍陆柒捌玖";
  var ip = Math.floor(n), dp = Math.round((n-ip)*100);
  var is = String(ip), rs = "";
  for (var i=0; i<is.length; i++) {
    var d = parseInt(is[i]), p = is.length-i-1;
    if (d===0) { if (p===4&&rs) rs+="万"; else if (!rs.endsWith("零")&&i<is.length-1) rs+="零"; }
    else { if (p>=1&&p<=4) rs+=["","万","千","百","十"][p]; rs+=CN[d]; }
  }
  rs = rs.replace(/零+/g,"零").replace(/零(万|千|百|十)/g,"$1").replace(/零$/,"");
  if (dp===0) return rs+"元整";
  return rs+"元"+CN[Math.floor(dp/10)]+"角"+CN[dp%10]+"分";
}

// 单元格
function tc(text, opts) {
  opts = opts||{};
  var w = opts.w||1000, cs = opts.cs||1, shade = opts.shade||null, bold = !!opts.bold;
  var tcPr = '<w:tcPr>'+(w?'<w:tcW w:w="'+w+'" w:type="dxa"/>':'')+(cs>1?'<w:gridSpan w:val="'+cs+'"/>':'');
  if (shade) tcPr += '<w:shd w:val="clear" w:color="auto" w:fill="'+shade+'"/>';
  tcPr += '</w:tcPr>';
  var rPr = bold?'<w:rPr><w:rFonts w:eastAsia="SimHei"/><w:b/></w:rPr>':'<w:rPr><w:rFonts w:eastAsia="SimSun"/></w:rPr>';
  var txt = text==null||text===undefined?"":String(text);
  var lines = txt.split("\n");
  var children = lines.map(function(line, i) {
    return '<w:p><w:pPr>'+rPr+'</w:pPr><w:r><w:rPr>'+rPr+'</w:rPr><w:t xml:space="preserve">'+J.esc(line)+'</w:t></w:r></w:p>';
  }).join("");
  return '<w:tc>'+tcPr+children+'</w:tc>';
}

// 表格行
function tr(cells) {
  return '<w:tr>'+cells.join('')+'</w:tr>';
}

// 生成 [内容说明] 行的金额格
function amtCells(n) {
  var parts = (parseFloat(n)||0).toFixed(2).replace(".","").padEnd(7,"0").split("");
  return parts.map(function(v){ return tc(v==="0"?"":v,{w:600}); });
}

// 主函数：构建 docx 文件的 XML（.docx = zip）
function buildDocx(bodyXml) {
  // [Content_Types].xml
  var ct = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
    '<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">'+
    '<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>'+
    '<Default Extension="xml" ContentType="application/xml"/>'+
    '<Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>'+
    '</Types>';

  // _rels/.rels
  var rels = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
    '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'+
    '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>'+
    '</Relationships>';

  // word/_rels/document.xml.rels
  var docRels = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
    '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'+
    '</Relationships>';

  // word/document.xml
  var sectPr = '<w:sectPr><w:pgSz w:w="12240" w:h="15840"/><w:pgMar w:top="1440" w:right="1440" w:bottom="1440" w:left="1440"/></w:sectPr>';
  var docXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
    '<w:document xmlns:wpc="http://schemas.microsoft.com/office/word/2010/wordprocessingCanvas"'+
    ' xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"'+
    ' xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">'+
    '<w:body>'+bodyXml+sectPr+'</w:body></w:document>';

  return [ct, rels, docRels, docXml];
}

function zip(files) {
  var parts = [];
  var offsets = [];
  var central = [];
  var offset = 0;
  for (var i=0; i<files.length; i++) {
    var name = files[i].name, data = files[i].data;
    offsets.push(offset);
    var entry = J.zipEntry(name, data);
    parts.push(entry);
    offset += entry.length;
    // central directory
    central.push(J.zipCentral(name, entry.length, offsets[i]));
  }
  var cdOffset = offset;
  var cd = central.join('');
  var cdEnd = J.zipEnd(cd.length, offset);
  var all = parts.join('') + cd + cdEnd;
  // Convert to ArrayBuffer
  var buf = new ArrayBuffer(all.length);
  var view = new Uint8Array(buf);
  for (var i=0; i<all.length; i++) view[i] = all.charCodeAt(i);
  return buf;
}

J.zipEntry = function(name, data) {
  var nameBytes = unescape(encodeURIComponent(name));
  var dataBytes = data;
  var header = [
    J.pack("I", 0x04034b50),
    J.pack("v", 20), // version needed
    J.pack("v", 0), // flags
    J.pack("v", 0), // compression (stored)
    J.pack("v", 0), // mod time
    J.pack("v", 0), // mod date
    J.pack("I", 0), // crc32 (0 for now)
    J.pack("I", dataBytes.length),
    J.pack("I", dataBytes.length),
    J.pack("v", nameBytes.length),
    J.pack("v", 0), // extra field
  ].join('');
  var crc = J.crc32(dataBytes);
  header = [
    J.pack("I", 0x04034b50),
    J.pack("v", 20),
    J.pack("v", 0),
    J.pack("v", 0),
    J.pack("v", 0),
    J.pack("v", 0),
    J.pack("I", crc),
    J.pack("I", dataBytes.length),
    J.pack("I", dataBytes.length),
    J.pack("v", nameBytes.length),
    J.pack("v", 0),
  ].join('');
  return header + nameBytes + dataBytes;
};

J.zipCentral = function(name, len, offset) {
  var nameBytes = unescape(encodeURIComponent(name));
  return [
    J.pack("I", 0x02014b50),
    J.pack("v", 20), // version made by
    J.pack("v", 20), // version needed
    J.pack("v", 0), // flags
    J.pack("v", 0), // compression
    J.pack("v", 0), // mod time
    J.pack("v", 0), // mod date
    J.pack("I", 0), // crc
    J.pack("I", len), // compressed size
    J.pack("I", len), // uncompressed size
    J.pack("v", nameBytes.length),
    J.pack("v", 0), // extra field
    J.pack("v", 0), // comment
    J.pack("v", 0), // disk start
    J.pack("v", 0), // attr
    J.pack("I", 0), // offset
  ].join('') + nameBytes;
};

J.zipEnd = function(cdLen, cdOffset) {
  return [
    J.pack("I", 0x06054b50),
    J.pack("v", 0), // disk
    J.pack("v", 0), // cd disk
    J.pack("v", 1), // entries on disk
    J.pack("v", 1), // total entries
    J.pack("I", cdLen),
    J.pack("I", cdOffset),
    J.pack("v", 0), // comment len
  ].join('');
};

J.pack = function(type, val) {
  if (type === "I") {
    return String.fromCharCode(val&0xff, (val>>8)&0xff, (val>>16)&0xff, (val>>24)&0xff);
  } else if (type === "v") {
    return String.fromCharCode(val&0xff, (val>>8)&0xff);
  }
  return "";
};

J.crc32 = function(data) {
  var table = [];
  for (var i=0; i<256; i++) {
    var c = i;
    for (var j=0; j<8; j++) c = (c&1) ? (0xEDB88320 ^ (c>>>1)) : (c>>>1);
    table[i] = c;
  }
  var crc = 0xffffffff;
  for (var i=0; i<data.length; i++) crc = table[(crc ^ data.charCodeAt(i)) & 0xff] ^ (crc>>>8);
  return (crc ^ 0xffffffff)>>>0;
};

function download(buf, filename) {
  var blob = new Blob([buf], {type:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = filename;
  a.style.display = "none";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
}

// ══════════════════════════════════════════════
//  四个表单的 XML 构建函数
// ══════════════════════════════════════════════

// 表1：出差审批表
function build01(d) {
  var rows = [];
  // 标题
  rows.push(tr([
    tc("太仓市生物医药产业园有限公司 出差审批表", {w:14400, cs:7, shade:"1a3a5c", bold:true})
  ]));
  // 申请日期
  rows.push(tr([tc("申请日期："+fd(d.date), {w:14400, cs:7})]));
  // 申请部门 + 申请人 + 参与人数
  rows.push(tr([
    tc("申请部门",{w:1800,shade:"F0F4F8"}), tc(d.dept,{w:3000,cs:5}),
    tc("申请人",{w:1400,shade:"F0F4F8"}), tc(d.name,{w:2800,cs:3}),
    tc("参与人数",{w:1400,shade:"F0F4F8"}), tc(d.participants||"",{w:1000})
  ]));
  // 出差地点 + 日期
  rows.push(tr([
    tc("出差地点",{w:1800,shade:"F0F4F8"}), tc(d.dest||"",{w:3000,cs:5}),
    tc("出差日期",{w:1400,shade:"F0F4F8"}),
    tc("自 "+fd(d.start_date,"short"),{w:1600}), tc("至 "+fd(d.end_date,"short"),{w:1600}),
    tc("共 天",{w:1000,shade:"F0F4F8"}), tc(d.days||"",{w:1000})
  ]));
  // 交通类型
  rows.push(tr([
    tc("交通类型",{w:1800,shade:"F0F4F8"}),
    tc("□自备车  □公共交通（公路、铁路、航空）",{w:12600,cs:6})
  ]));
  // 出差事由
  rows.push(tr([
    tc("出差事由",{w:1800,shade:"F0F4F8"}),
    tc(d.reason||"",{w:12600,cs:6})
  ]));
  // 部门审核
  rows.push(tr([
    tc("部门审核",{w:1800,shade:"F0F4F8"}), tc("",{w:4000,cs:4}),
    tc("领导审批",{w:1400,shade:"F0F4F8"}), tc("",{w:7200,cs:6})
  ]));

  var tableXml = '<w:tbl><w:tblPr><w:tblW w:w="14400" w:type="dxa"/>'+
    '<w:tblBorders><w:top w:val="single" w:sz="4" w:space="0" w:color="999999"/>'+
    '<w:left w:val="single" w:sz="4" w:space="0" w:color="999999"/>'+
    '<w:bottom w:val="single" w:sz="4" w:space="0" w:color="999999"/>'+
    '<w:right w:val="single" w:sz="4" w:space="0" w:color="999999"/>'+
    '<w:insideH w:val="single" w:sz="4" w:space="0" w:color="999999"/>'+
    '<w:insideV w:val="single" w:sz="4" w:space="0" w:color="999999"/>'+
    '</w:tblBorders></w:tblPr>'+rows.join('')+'</w:tbl>';

  var para = function(t, size, bold, color, align, before, after) {
    var sz = size||18, clr = color||"333333", al = align||"left", bf = bold?"<w:b/>":"", bef = before||0, aft = after||0;
    return '<w:p><w:pPr><w:jc w:val="'+al+'"/><w:spacing w:before="'+bef+'" w:after="'+aft+'"/>'+
      '<w:rPr><w:rFonts w:eastAsia="SimHei"/><w:sz w:val="'+sz+'"/><w:szCs w:val="'+sz+'"/><w:color w:val="'+clr+'"/></w:rPr></w:pPr>'+
      '<w:r><w:rPr><w:rFonts w:eastAsia="SimHei"/><w:sz w:val="'+sz+'"/><w:szCs w:val="'+sz+'"/><w:color w:val="'+clr+'"/>'+bf+'</w:rPr>'+
      '<w:t xml:space="preserve">'+J.esc(t)+'</w:t></w:r></w:p>';
  };

  return buildDocx(
    tableXml +
    '<w:p/>'+
    para("经办人："+d.name+"    部门负责人：    财务审核：    领导审批：", 16, false, "888888")
  );
}

// 表2/3：费用报销单
function build02(d) {
  var amt = parseFloat(d.amount)||0;
  var amtStr = amt.toFixed(2);
  var parts = amtStr.replace(".","").padEnd(7,"0").split("");

  var amtRow = [
    tc("业务招待",{w:1000}),
    tc(d.detail||"",{w:3200,cs:3}),
    tc(parts[0]==="0"?"":parts[0],{w:600}),
    tc(parts[1]==="0"?"":parts[1],{w:600}),
    tc(parts[2]==="0"?"":parts[2],{w:600}),
    tc(parts[3]==="0"?"":parts[3],{w:600}),
    tc(parts[4]==="0"?"":parts[4],{w:600}),
    tc(parts[5]==="0"?"":parts[5],{w:600}),
    tc(parts[6]==="0"?"":parts[6],{w:600}),
  ];

  var blankRow = [
    tc("",{w:1000}), tc("",{w:3200,cs:3}),
    tc("",{w:600}),tc("",{w:600}),tc("",{w:600}),tc("",{w:600}),tc("",{w:600}),tc("",{w:600}),tc("",{w:600})
  ];

  var rows = [
    tr([tc("姓名",{w:800,shade:"F0F4F8"}), tc(d.name,{w:1400}), tc("部门",{w:800,shade:"F0F4F8"}), tc(d.dept,{w:2400,cs:3}), tc("附件数",{w:1000,cs:4}), tc("",{w:2800})]),
    tr([tc("费用项目",{w:800,shade:"F0F4F8"}), tc("内容说明",{w:3200,cs:3,shade:"F0F4F8"}), tc("金额",{w:1000,shade:"F0F4F8"}), tc("万",{w:600,shade:"F0F4F8"}), tc("千",{w:600,shade:"F0F4F8"}), tc("百",{w:600,shade:"F0F4F8"}), tc("十",{w:600,shade:"F0F4F8"}), tc("元",{w:600,shade:"F0F4F8"}), tc("角",{w:600,shade:"F0F4F8"}), tc("分",{w:600,shade:"F0F4F8"})]),
    tr(amtRow),
    tr(blankRow),
    tr([tc("合计金额",{w:800,shade:"F0F4F8"}), tc(acn(amt),{w:3200,cs:3}), tc("",{w:600}),tc("",{w:600}),tc("",{w:600}),tc("",{w:600}),tc("",{w:600}),tc("",{w:600}),tc("",{w:600})]),
  ];

  var tableXml = '<w:tbl><w:tblPr><w:tblW w:w="14400" w:type="dxa"/>'+
    '<w:tblBorders><w:top w:val="single" w:sz="4" w:space="0" w:color="999999"/>'+
    '<w:left w:val="single" w:sz="4" w:space="0" w:color="999999"/>'+
    '<w:bottom w:val="single" w:sz="4" w:space="0" w:color="999999"/>'+
    '<w:right w:val="single" w:sz="4" w:space="0" w:color="999999"/>'+

}

// 表4：商务接待审批表
function build04(d) {

  var para = function(t, size, bold, color, before, after) {

    return '<w:p><w:pPr><w:spacing w:before="'+bef+'" w:after="'+aft+'"/><w:rPr><w:rFonts w:eastAsia="SimHei"/>'+

  };

  var t0Rows = [
    tr([tc("来客单位",{w:1200,shade:"F0F4F8"}), tc(d.guest||"",{w:2400}), tc("来访时间",{w:1200,shade:"F0F4F8"}), tc(fd(d.visit_date,"short"),{w:1600}), tc("来客人数",{w:1200,shade:"F0F4F8"}), tc(d.guest_count||"",{w:1200})]),
    tr([tc("来访事由",{w:1200,shade:"F0F4F8"}), tc(d.reason||"",{w:13200,cs:5})]),
    tr([tc("接待单位",{w:1200,shade:"F0F4F8"}), tc("太仓市生物医药产业园有限公司",{w:2400}), tc("陪同人员",{w:1200,shade:"F0F4F8"}), tc(d.escort||"",{w:3600,cs:3})]),
    tr([tc("接待类别",{w:1200,shade:"F0F4F8"}), tc(meal,{w:3000,cs:3}), tc("接待标准",{w:1200,shade:"F0F4F8"}), tc((d.budget||"")+"元/人",{w:1200}), tc("",{w:1200})]),
    tr([tc("其他事项",{w:1200,shade:"F0F4F8"}), tc("",{w:13200,cs:5})]),
  ];

  var totalFee = (parseFloat(d.budget)||0) * (parseInt(d.guest_count)||0);
  var t1Rows = [
    tr([tc("负责接待单位（单位盖章）",{w:1600,shade:"F0F4F8"}), tc("太仓市生物医药产业园有限公司",{w:1600}), tc("陪同人员",{w:1000,shade:"F0F4F8"}), tc(d.escort+" 人",{w:1200}), tc("",{w:1200}), tc("",{w:1200})]),
    tr([tc("来访单位",{w:1600,shade:"F0F4F8"}), tc(d.guest||"",{w:1600}), tc("来访人数",{w:1000,shade:"F0F4F8"}), tc((d.guest_count||"")+" 人",{w:1200}), tc("",{w:1200}), tc("",{w:1200})]),
    tr([tc("来访时间",{w:1600,shade:"F0F4F8"}), tc(fd(d.visit_date,"short"),{w:1600}), tc("是否出具公函",{w:1000,shade:"F0F4F8"}), tc("□是  ☑否",{w:1200}), tc("",{w:1200}), tc("",{w:1200})]),
    tr([tc("商务活动内容",{w:1600,shade:"F0F4F8"}), tc(d.reason||"",{w:6000,cs:5})]),
    tr([tc("发生费用",{w:1600,shade:"F0F4F8"}), tc("就餐地点："+(d.venue||"/"),{w:3200,cs:3}), tc(totalFee?String(totalFee)+"元":"/",{w:1200}), tc("",{w:1200}), tc("",{w:1200})]),
  ];

  var borderB = '<w:tblBorders><w:top w:val="single" w:sz="4" w:space="0" w:color="999999"/><w:left w:val="single" w:sz="4" w:space="0" w:color="999999"/><w:bottom w:val="single" w:sz="4" w:space="0" w:color="999999"/><w:right w:val="single" w:sz="4" w:space="0" w:color="999999"/><w:insideH w:val="single" w:sz="4" w:space="0" w:color="999999"/><w:insideV w:val="single" w:sz="4" w:space="0" w:color="999999"/></w:tblBorders>';
  var t0Xml = '<w:tbl><w:tblPr><w:tblW w:w="14400" w:type="dxa"/>'+borderB+'</w:tblPr>'+t0Rows.join('')+'</w:tbl>';
  var t1Xml = '<w:tbl><w:tblPr><w:tblW w:w="14400" w:type="dxa"/>'+borderB+'</w:tblPr>'+t1Rows.join('')+'</w:tbl>';

  return buildDocx(
    para("商务接待审批表", 26, true, "1a3a5c") +
    para("申请人："+d.name+"    批准人：    申请日期："+fd(d.date), 16, false, "444444") +
    '<w:p/>'+t0Xml+'<w:p/>'+
    para("商务接待清单", 20, true, "1a3a5c") +
    '<w:p/>'+t1Xml
  );
}

// ══════════════════════════════════════════════
//  主函数
// ══════════════════════════════════════════════
function gen() {
  var btn = document.getElementById("btn");
  var msg = document.getElementById("msg");
  var errEl = document.getElementById("err");

  msg.classList.remove("show");
  errEl.classList.remove("show");

  var name = document.getElementById("name").value.trim();
  var dept = document.getElementById("dept").value.trim();
  if (!name || !dept) {
    errEl.textContent = "❌ 请填写姓名和部门";
    errEl.classList.add("show");
    return;
  }

  var d = {
    name: name,
    dept: dept,
    date: document.getElementById("date").value,
    reason: document.getElementById("reason").value.trim(),
    dest: document.getElementById("dest").value.trim(),
    participants: document.getElementById("participants").value.trim(),
    days: document.getElementById("days").value.trim(),
    start_date: document.getElementById("start_date").value,
    end_date: document.getElementById("end_date").value,
    detail: document.getElementById("detail").value.trim(),
    amount: document.getElementById("amount").value.trim(),
    guest: document.getElementById("guest").value.trim(),
    guest_count: document.getElementById("guest_count").value.trim(),
    visit_date: document.getElementById("visit_date").value,
    escort: document.getElementById("escort").value.trim(),
    venue: document.getElementById("venue").value.trim(),
    budget: document.getElementById("budget").value.trim(),
    meal: (document.querySelector('input[name="meal"]:checked')||{value:"晚餐"}).value,
  };

  btn.disabled = true;
  btn.textContent = "生成中...";

  try {
    var files = [
      {name:"[Content_Types].xml", data:build01(d)[0]},
      {name:"_rels/.rels", data:build01(d)[1]},
      {name:"word/_rels/document.xml.rels", data:build01(d)[2]},
      {name:"word/document.xml", data:build01(d)[3]},
    ];
    download(zip(files), "01出差审批表.docx");
    files = [
      {name:"[Content_Types].xml", data:build02(d)[0]},
      {name:"_rels/.rels", data:build02(d)[1]},
      {name:"word/_rels/document.xml.rels", data:build02(d)[2]},
      {name:"word/document.xml", data:build02(d)[3]},
    ];
    download(zip(files), "02费用报销单.docx");
    download(zip(files), "03费用报销单.docx");
    files = [
      {name:"[Content_Types].xml", data:build04(d)[0]},
      {name:"_rels/.rels", data:build04(d)[1]},
      {name:"word/_rels/document.xml.rels", data:build04(d)[2]},
      {name:"word/document.xml", data:build04(d)[3]},
    ];
    download(zip(files), "04商务接待审批表.docx");

    msg.classList.add("show");
  } catch(e) {
    errEl.textContent = "❌ 错误：" + e.message;
    errEl.classList.add("show");
  } finally {
    btn.disabled = false;
    btn.textContent = "🚀 生成 4 份报销文档";
  }
}

// 设置默认日期
(function() {
  var t = new Date().toISOString().split("T")[0];
  ["date","start_date","end_date","visit_date"].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.value = t;
  });
})();
</script>
