<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>报销材料生成器</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Microsoft YaHei",sans-serif;background:#eef2f7;min-height:100vh}
.container{max-width:620px;margin:0 auto;padding:16px 12px 60px}
h1{text-align:center;font-size:22px;color:#1a3a5c;padding:16px 0 4px}
.sub{text-align:center;font-size:12px;color:#999;margin-bottom:12px}
.note{background:#fffde7;border:1px solid #ffe082;border-radius:8px;padding:10px 14px;font-size:12px;color:#888;margin-bottom:12px}
.card{background:#fff;border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,.07);padding:16px 14px;margin-bottom:10px}
.sec{font-size:12px;font-weight:700;color:#fff;background:#1a3a5c;padding:5px 10px;border-radius:5px;margin-bottom:10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 12px}
.full{grid-column:1/-1}
label{display:block;font-size:11px;color:#666;margin-bottom:3px}
label span{color:#e53e3e}
input,textarea{border:1.5px solid #cdd5e3;border-radius:6px;padding:8px 10px;font-size:13px;font-family:inherit;width:100%;background:#fafbfc;outline:none}
input:focus,textarea:focus{border-color:#1a3a5c;background:#fff}
textarea{min-height:52px;resize:vertical}
.rg{display:flex;gap:12px;padding:4px 0}
.rg label{display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer}
.rg input{width:auto}
.btn{background:#1a3a5c;color:#fff;border:none;padding:13px 24px;font-size:15px;font-weight:700;border-radius:40px;cursor:pointer;width:100%;margin-top:14px;font-family:inherit}
.btn:disabled{background:#aaa;cursor:not-allowed}
.msg{background:#e8f5e9;border:1px solid #a5d6a7;border-radius:10px;padding:14px;margin-top:14px;font-size:13px;color:#2e7d32;display:none}
.msg.show{display:block}
.err{background:#ffebee;border:1px solid #ef9a9a;border-radius:10px;padding:14px;margin-top:14px;font-size:13px;color:#c62828;display:none}
.err.show{display:block}
</style>
</head>
<body>
<div class="container">
  <h1>报销材料生成器</h1>
  <p class="sub">填一次信息，生成 4 份 DOCX 文件</p>
  <div class="note">用 Microsoft Word 打开生成的 DOCX 文件</div>

  <div class="card">
    <div class="sec">通用信息</div>
    <div class="grid">
      <div class="full"><label>姓名 <span>*</span></label><input id="name" placeholder="如：潘骅"></div>
      <div class="full"><label>部门 <span>*</span></label><input id="dept" placeholder="如：招商发展部"></div>
      <div class="full"><label>申请日期 <span>*</span></label><input type="date" id="date"></div>
      <div class="full"><label>出差事由 <span>*</span></label><input id="reason" placeholder="如：商务考察"></div>
    </div>
  </div>

  <div class="card">
    <div class="sec">差旅信息</div>
    <div class="grid">
      <div class="full"><label>出差地点</label><input id="dest" placeholder="如：南京"></div>
      <div><label>随行人数</label><input id="participants" placeholder="3"></div>
      <div><label>出差天数</label><input id="days" placeholder="2"></div>
      <div><label>出发日期</label><input type="date" id="start_date"></div>
      <div><label>返回日期</label><input type="date" id="end_date"></div>
    </div>
  </div>

  <div class="card">
    <div class="sec">费用信息</div>
    <div class="grid">
      <div class="full"><label>费用内容说明</label><textarea id="detail" placeholder="如：2025.6.15招待南京医药集团领导"></textarea></div>
      <div><label>金额（元）</label><input id="amount" placeholder="1362"></div>
    </div>
  </div>

  <div class="card">
    <div class="sec">接待审批</div>
    <div class="grid">
      <div class="full"><label>来客单位</label><input id="guest" placeholder="如：南京医药集团"></div>
      <div><label>来客人数</label><input id="guest_count" placeholder="5"></div>
      <div><label>来访日期</label><input type="date" id="visit_date"></div>
      <div class="full"><label>陪同人员</label><input id="escort" placeholder="如：李百军、潘骅"></div>
      <div class="full"><label>就餐地点</label><input id="venue" placeholder="如：江南艺库"></div>
      <div><label>人均标准</label><input id="budget" placeholder="150"></div>
      <div class="full">
        <label>接待类别</label>
        <div class="rg">
          <label><input type="radio" name="meal" value="早餐"> 早餐</label>
          <label><input type="radio" name="meal" value="午餐"> 午餐</label>
          <label><input type="radio" name="meal" value="晚餐" checked> 晚餐</label>
        </div>
      </div>
    </div>
  </div>

  <button class="btn" id="btn" onclick="gen()">生成 4 份报销文档</button>
  <div class="msg" id="msg"><strong>生成完成！</strong> 4 个 DOCX 文件已下载。</div>
  <div class="err" id="errEl"></div>
</div>

<script>
function esc(s){if(s==null)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function fd(s){var d=s?new Date(s):new Date();if(isNaN(d))d=new Date();return d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日";}
function fdShort(s){var d=s?new Date(s):new Date();if(isNaN(d))d=new Date();return d.getFullYear()+"."+String(d.getMonth()+1).padStart(2,"0")+"."+String(d.getDate()).padStart(2,"0");}
function acn(n){n=parseFloat(n)||0;var CN="零壹贰叁肆伍陆柒捌玖";var ip=Math.floor(n),dp=Math.round((n-ip)*100);var is=String(ip),rs="";for(var i=0;i<is.length;i++){var d=parseInt(is[i]),p=is.length-i-1;if(d===0){if(p===4&&rs)rs+="万";else if(!rs.endsWith("零")&&i<is.length-1)rs+="零";}else{if(p>=1&&p<=4)rs+=["","万","千","百","十"][p];rs+=CN[d];}} rs=rs.replace(/零+/g,"零").replace(/零(万|千|百|十)/g,"$1").replace(/零$/,"");if(dp===0)return rs+"元整";return rs+"元"+CN[Math.floor(dp/10)]+"角"+CN[dp%10]+"分";}
function getMeal(v){return v==="早餐"?"☑早餐  □午餐  □晚餐":v==="午餐"?"□早餐  ☑午餐  □晚餐":"□早餐  □午餐  ☑晚餐";}

function fillXml(xml,d){
  var date=fd(d.date);
  var startD=fdShort(d.start_date);
  var endD=fdShort(d.end_date);
  var visitD=fdShort(d.visit_date);
  return xml
    .replace(/\{\{NAME\}\}/g,esc(d.name))
    .replace(/\{\{DEPT\}\}/g,esc(d.dept))
    .replace(/\{\{DATE\}\}/g,date)
    .replace(/\{\{DEST\}\}/g,esc(d.dest))
    .replace(/\{\{REASON\}\}/g,esc(d.reason))
    .replace(/\{\{PARTICIPANTS\}\}/g,esc(d.participants))
    .replace(/\{\{DAYS\}\}/g,esc(d.days))
    .replace(/\{\{START_Y\}\}/g,d.start_date?d.start_date.split("-")[0]:"")
    .replace(/\{\{START_M\}\}/g,d.start_date?String(parseInt(d.start_date.split("-")[1])):"")
    .replace(/\{\{START_D\}\}/g,d.start_date?String(parseInt(d.start_date.split("-")[2])):"")
    .replace(/\{\{END_Y\}\}/g,d.end_date?d.end_date.split("-")[0]:"")
    .replace(/\{\{END_M\}\}/g,d.end_date?String(parseInt(d.end_date.split("-")[1])):"")
    .replace(/\{\{END_D\}\}/g,d.end_date?String(parseInt(d.end_date.split("-")[2])):"")
    .replace(/\{\{DETAIL\}\}/g,esc(d.detail))
    .replace(/\{\{AMOUNT\}\}/g,String(parseFloat(d.amount)||0))
    .replace(/\{\{GUEST\}\}/g,esc(d.guest))
    .replace(/\{\{GUEST_COUNT\}\}/g,esc(d.guest_count))
    .replace(/\{\{VISIT_DATE\}\}/g,visitD)
    .replace(/\{\{ESCORT\}\}/g,esc(d.escort))
    .replace(/\{\{VENUE\}\}/g,esc(d.venue))
    .replace(/\{\{BUDGET\}\}/g,esc(d.budget))
    .replace(/\{\{MEAL\}\}/g,getMeal(d.meal));
}

async function downloadDocx(b64,d,outName){
  var binary=atob(b64);
  var len=binary.length;
  var bytes=new Uint8Array(len);
  for(var i=0;i<len;i++) bytes[i]=binary.charCodeAt(i);
  var zip=await JSZip.loadAsync(bytes);
  var docXml=await zip.file("word/document.xml").async("string");
  docXml=fillXml(docXml,d);
  zip.file("word/document.xml",docXml);
  var newBytes=await zip.generateAsync({type:"uint8array",compression:"DEFLATE",compressionOptions:{level:9}});
  var blob=new Blob([newBytes],{type:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");a.href=url;a.download=outName;a.style.display="none";
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},2000);
}
