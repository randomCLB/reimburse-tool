<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>报销材料生成器</title>
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"Microsoft YaHei",sans-serif;background:#eef2f7;min-height:100vh}
.container{max-width:680px;margin:0 auto;padding:20px 16px 60px}
h1{text-align:center;font-size:24px;color:#1a3a5c;padding:20px 0 6px}
.subtitle{text-align:center;font-size:13px;color:#888;margin-bottom:18px}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.07);padding:20px 18px;margin-bottom:14px}
.section-title{font-size:13px;font-weight:700;color:#fff;background:#1a3a5c;padding:6px 12px;border-radius:6px;margin-bottom:14px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px}
.full{grid-column:1/-1}
label{display:block;font-size:12px;color:#555;margin-bottom:4px}
label span{color:#e53e3e}
input,select,textarea{padding:9px 12px;border:1.5px solid #cdd5e3;border-radius:7px;font-size:13px;font-family:inherit;width:100%;background:#fafbfc;outline:none;transition:border .2s}
input:focus,select:focus,textarea:focus{border-color:#1a3a5c;background:#fff}
textarea{min-height:60px;resize:vertical}
.btn{background:#1a3a5c;color:#fff;border:none;padding:14px 32px;font-size:15px;font-weight:700;border-radius:40px;cursor:pointer;display:block;width:100%;font-family:inherit;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn:disabled{background:#999;cursor:not-allowed}
.result{background:#e8f5e9;border:1px solid #a5d6a7;border-radius:10px;padding:16px;margin-top:16px;font-size:13px;color:#2e7d32;display:none}
.result.show{display:block}
.error-box{background:#ffebee;border:1px solid #ef9a9a;border-radius:10px;padding:16px;margin-top:16px;font-size:13px;color:#c62828;display:none}
.error-box.show{display:block}
.files{list-style:none;margin-top:10px}
.files li{padding:4px 0;border-bottom:1px solid #f0f0f0}
.files li:last-child{border:none}
.note{background:#fffde7;border:1px solid #fff59d;border-radius:8px;padding:10px 14px;font-size:11px;color:#888;margin-bottom:14px}
.radio-group{display:flex;gap:16px;padding:6px 0}
.radio-group label{display:flex;align-items:center;gap:4px;font-weight:400;cursor:pointer;font-size:13px}
.radio-group input{width:auto}
#loading{display:none;text-align:center;padding:20px;font-size:14px;color:#666}
#loading.show{display:block}
</style>
</head>
<body>
<div class="container">
  <h1>📋 报销材料生成器</h1>
  <p class="subtitle">填一次信息 → 生成 4 份报销文档</p>

  <div class="note" id="loadStatus">⚠️ 正在加载组件，请稍候...</div>

  <div class="card">
    <div class="section-title">👤 通用信息</div>
    <div class="grid">
      <div class="full"><label>姓名 <span>*</span></label><input id="name" placeholder="如：潘骅" required></div>
      <div class="full"><label>部门 <span>*</span></label><input id="dept" placeholder="如：招商发展部"></div>
      <div class="full"><label>申请日期 <span>*</span></label><input type="date" id="date"></div>
      <div class="full"><label>出差事由 <span>*</span></label><input id="reason" placeholder="如：商务接待"></div>
    </div>
  </div>

  <div class="card">
    <div class="section-title">🚄 差旅信息</div>
    <div class="grid">
      <div class="full"><label>出差地点</label><input id="destination" placeholder="如：南京"></div>
      <div><label>随行人数</label><input id="participants" placeholder="如：3"></div>
      <div><label>出差天数</label><input id="days" placeholder="如：2"></div>
      <div><label>出发日期</label><input type="date" id="start_date"></div>
      <div><label>返回日期</label><input type="date" id="end_date"></div>
    </div>
  </div>

  <div class="card">
    <div class="section-title">💰 费用信息</div>
    <div class="grid">
      <div class="full"><label>费用内容说明</label><textarea id="amount_detail" placeholder="如：2025.6.15招待南京医药集团领导，地点：南京金陵饭店，共5人"></textarea></div>
      <div><label>金额（元）</label><input id="amount" placeholder="如：1362"></div>
    </div>
  </div>

  <div class="card">
    <div class="section-title">🤝 接待审批</div>
    <div class="grid">
      <div class="full"><label>来客单位</label><input id="guest_unit" placeholder="如：南京医药集团"></div>
      <div><label>来客人数</label><input id="guest_count" placeholder="如：5"></div>
      <div><label>来访日期</label><input type="date" id="visit_date"></div>
      <div class="full"><label>陪同人员</label><input id="escort" placeholder="如：李百军、潘骅"></div>
      <div class="full"><label>就餐地点</label><input id="venue" placeholder="如：江南艺库（圆融店）"></div>
      <div><label>人均标准（元）</label><input id="budget" placeholder="如：150"></div>
      <div class="full">
        <label>接待类别</label>
        <div class="radio-group">
          <label><input type="radio" name="meal" value="早餐"> 早餐</label>
          <label><input type="radio" name="meal" value="午餐"> 午餐</label>
          <label><input type="radio" name="meal" value="晚餐" checked> 晚餐</label>
        </div>
      </div>
    </div>
  </div>

  <button class="btn" id="generateBtn" onclick="generateDocs()" disabled>🚀 生成 4 份报销文档（加载中...）</button>

  <div id="loading">⏳ 正在生成文档，请稍候...</div>

  <div class="result" id="result">
    <strong>✅ 生成完成！共 4 个文件已下载。</strong>
    <ul class="files">
      <li>📄 01出差审批表.docx</li>
      <li>📄 02费用报销单.docx</li>
      <li>📄 03费用报销单.docx</li>
      <li>📄 04商务接待审批表.docx</li>
    </ul>
    <p style="margin-top:10px;font-size:12px;color:#666">如果浏览器没有自动下载，点击上面每个文件链接手动保存。</p>
  </div>

  <div class="error-box" id="errorMsg"></div>
</div>

<script>
window.addEventListener("DOMContentLoaded", function() {
  if (typeof docx === "undefined") {
    document.getElementById("loadStatus").textContent = "❌ 组件加载失败，请检查网络后刷新页面重试";
    return;
  }
  document.getElementById("loadStatus").style.display = "none";
  document.getElementById("generateBtn").disabled = false;
  document.getElementById("generateBtn").textContent = "🚀 生成 4 份报销文档";
  // 设置默认日期
  const today = new Date().toISOString().split("T")[0];
  ["date","start_date","end_date","visit_date"].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.value = today;
  });
});

// 等待 docx 加载
var checkLoaded = setInterval(function() {
  if (typeof docx !== "undefined") {
    clearInterval(checkLoaded);
    initApp();
  }
}, 200);
setTimeout(function() { clearInterval(checkLoaded); }, 15000);

function initApp() {
  // 已初始化
}

var docxLoaded = false;
function checkDocx() {
  if (typeof docx === "undefined" || typeof docx.Document === "undefined") {
    alert("组件未加载完成，请等待或刷新页面");
    return false;
  }
  return true;
}

var D = docx;
var Document = D.Document, Packer = D.Packer, Paragraph = D.Paragraph;
var TextRun = D.TextRun, Table = D.Table, TableRow = D.TableRow;
var TableCell = D.TableCell, WidthType = D.WidthType, BorderStyle = D.BorderStyle;
var AlignmentType = D.AlignmentType, ShadingType = D.ShadingType;
var TableLayoutType = D.TableLayoutType;

// ─────────────────────────────────────────
// 工具函数
// ─────────────────────────────────────────
function fmtDate(dateStr) {
  if (!dateStr) { var d = new Date(); return d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日"; }
  var d = new Date(dateStr); if (isNaN(d)) return dateStr;
  return d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日";
}
function fmtDateShort(dateStr) {
  if (!dateStr) { var d = new Date(); return d.getFullYear()+"."+String(d.getMonth()+1).padStart(2,"0")+"."+String(d.getDate()).padStart(2,"0"); }
  var d = new Date(dateStr); if (isNaN(d)) return dateStr;
  return d.getFullYear()+"."+String(d.getMonth()+1).padStart(2,"0")+"."+String(d.getDate()).padStart(2,"0");
}

function amountCn(amount) {
  if (!amount) return "";
  var n = parseFloat(amount);
  if (isNaN(n) || n === 0) return "零元整";
  var CN = "零壹贰叁肆伍陆柒捌玖";
  var intPart = Math.floor(n);
  var dec1 = Math.floor((n * 10) % 10);
  var dec2 = Math.round((n * 100) % 10);
  var units = ["","万","千","百","十"];
  var intStr = String(intPart);
  var result = "";
  for (var i = 0; i < intStr.length; i++) {
    var digit = parseInt(intStr[i]);
    var pos = intStr.length - i - 1;
    if (digit === 0) {
      if (pos === 4 && result.length > 0) result += "万";
      if (!result.endsWith("零") && i < intStr.length - 1) result += "零";
    } else {
      if (pos >= 1 && pos <= 4) result += units[pos];
      result += CN[digit];
    }
  }
  result = result.replace(/零+/g,"零").replace(/零(万|千|百|十)/g,"$1").replace(/零$/,"");
  if (dec1 === 0 && dec2 === 0) return result + "元整";
  if (dec2 === 0) return result + "元" + CN[dec1] + "角";
  return result + "元" + CN[dec1] + "角" + CN[dec2] + "分";
}

var BORDER = { style: BorderStyle.SINGLE, size: 1, color: "999999" };
var NO_BORDER = { style: BorderStyle.NONE, size: 0, color: "FFFFFF" };
var CP = { borders: { top: BORDER, bottom: BORDER, left: BORDER, right: BORDER } };

function hc(text) {
  return new TableCell({
    width: { size: 1400, type: WidthType.DXA },
    shading: { fill: "1a3a5c", type: ShadingType.CLEAR, color: "1a3a5c" },
    ...CP,
    children: [new Paragraph({ children: [new TextRun({ text: text, bold: true, color: "FFFFFF", size: 18, font: "SimSun" })], alignment: AlignmentType.CENTER })]
  });
}
function vc(text, w, bold) {
  return new TableCell({
    width: { size: w || 1400, type: WidthType.DXA },
    ...CP,
    children: [new Paragraph({ children: [new TextRun({ text: String(text||""), bold: !!bold, size: 18, font: "SimSun" })], alignment: AlignmentType.LEFT })]
  });
}
function lc(text, w) {
  return new TableCell({
    width: { size: w || 1400, type: WidthType.DXA },
    shading: { fill: "F0F4F8", type: ShadingType.CLEAR, color: "F0F4F8" },
    ...CP,
    children: [new Paragraph({ children: [new TextRun({ text: text, size: 18, font: "SimSun" })], alignment: AlignmentType.CENTER })]
  });
}
function lp(text) {
  return new Paragraph({ children: [new TextRun({ text: text, size: 18, font: "SimSun" })] });
}
function tp(text) {
  return new Paragraph({ children: [new TextRun({ text: text, bold: true, size: 22, font: "SimHei", color: "1a3a5c" })], alignment: AlignmentType.CENTER, spacing: { before: 100, after: 100 } });
}
function pp(text, size, color) {
  return new Paragraph({ children: [new TextRun({ text: text, size: size||18, font: "SimSun", color: color||"333" })] });
}
function spanCell(text, cols, w) {
  return new TableCell({
    columnSpan: cols,
    width: { size: w || 1000, type: WidthType.DXA },
    ...CP,
    children: [new Paragraph({ children: [new TextRun({ text: text, size: 18, font: "SimSun" })] })]
  });
}

// ─────────────────────────────────────────
// 01 出差审批表
// ─────────────────────────────────────────
function make01(d) {
  var name = d.name||"", dept = d.dept||"", date = fmtDate(d.date);
  var dest = d.destination||"", reason = d.reason||"";
  var participants = d.participants||"", days = d.days||"";
  var startD = fmtDateShort(d.start_date), endD = fmtDateShort(d.end_date);

  var tbl = new Table({
    width: { size: 100, type: WidthType.PERCENTAGE },
    rows: [
      new TableRow({ children: [new TableCell({ columnSpan: 7, ...CP, shading: { fill: "1a3a5c", type: ShadingType.CLEAR }, children: [tp("太仓市生物医药产业园有限公司 出差审批表")] })] }),
      new TableRow({ children: [new TableCell({ columnSpan: 7, ...CP, children: [pp("申请日期：" + date, 18)] })] }),
      new TableRow({ children: [lc("申请部门"), vc(dept,1200), vc("",800), lc("申请人"), vc(name,1200), lc("参与人数"), vc(participants,800)] }),
      new TableRow({ children: [lc("出差地点"), vc(dest,1200), vc("",800), lc("出差日期"), vc("自 "+startD,800), vc("至 "+endD,800), lc("共 天"), vc(days,800)] }),
      new TableRow({ children: [lc("交通类型"), spanCell("□自备车  □公共交通（公路、铁路、航空）", 6), vc("",800)] }),
      new TableRow({ children: [lc("出差事由"), spanCell(reason, 6), vc("",800)] }),
      new TableRow({ children: [lc("部门审核"), vc("",2400), lc("领导审批"), vc("",2400), vc("",400), vc("",400), vc("",400)] }),
    ]
  });

  return new Document({ sections: [{ children: [tbl, new Paragraph({}), pp("经办人："+name+"    部门负责人：    财务审核：    领导审批：", 16, "888")] }] });
}

// ─────────────────────────────────────────
// 02/03 费用报销单
// ─────────────────────────────────────────
function make02(d) {
  var name=d.name||"", dept=d.dept||"", date=fmtDate(d.date);
  var detail=d.amount_detail||"", amount=d.amount||"";
  var cnAmt = amountCn(amount);
  var amtStr = amount ? parseFloat(amount).toFixed(2) : "0.00";
  var parts = amtStr.replace(".","").padEnd(7,"0").split("");

  var tbl = new Table({
    width: { size: 100, type: WidthType.PERCENTAGE },
    rows: [
      new TableRow({ children: [lc("姓名",800), vc(name,1400), lc("部门",800), vc(dept,2400), spanCell("附件数",3,2400), vc("",800), vc("",800)] }),
      new TableRow({ children: [lc("费用项目",800), spanCell("内容说明",3,2400), lc("金额",600), vc("万"), vc("千"), vc("百"), vc("十"), vc("元"), vc("角"), vc("分")] }),
      new TableRow({ children: [vc("业务招待",800), spanCell(detail,3,2400), vc(parts[0]), vc(parts[1]), vc(parts[2]), vc(parts[3]), vc(parts[4]), vc(parts[5]), vc(parts[6])] }),
      new TableRow({ children: [vc("",800), spanCell("",3,2400), vc(""), vc(""), vc(""), vc(""), vc(""), vc(""), vc("")] }),
      new TableRow({ children: [lc("合计金额"), spanCell(cnAmt,3,2400), vc(""), vc(""), vc(""), vc(""), vc(""), vc(""), vc("")] }),
    ]
  });

  return new Document({ sections: [{
    children: [
      pp("太仓市生物医药产业园有限公司", 22, "1a3a5c"),
      tp("费用审批单"),
      tbl,
      new Paragraph({}),
      pp("费用收款单位/人："+name+"    填报日期："+date, 16),
      pp("报销人："+name+"    部门负责人：    财务审核：    领导审批：", 16),
      new Paragraph({}),
      pp("备注：10万元（含）以上费用报销使用《公司大额付款申请单》。", 14, "999"),
    ]
  }] });
}

// ─────────────────────────────────────────
// 04 商务接待审批表
// ─────────────────────────────────────────
function make04(d) {
  var name=d.name||"", date=fmtDate(d.date);
  var guest=d.guest_unit||"", guestCount=d.guest_count||"";
  var visitDate=fmtDateShort(d.visit_date);
  var reason=d.reason||"", escort=d.escort||"";
  var venue=d.venue||"", budget=d.budget||"";
  var meal=d.meal||"晚餐";
  var mealMap = {"早餐":"☑早餐  □午餐  □晚餐","午餐":"□早餐  ☑午餐  □晚餐","晚餐":"□早餐  □午餐  ☑晚餐"};

  var t0 = new Table({
    width: { size: 100, type: WidthType.PERCENTAGE },
    rows: [
      new TableRow({ children: [lc("来客单位",1000), vc(guest,2400), lc("来访时间",1000), vc(visitDate,1600), lc("来客人数",1000), vc(guestCount,1400)] }),
      new TableRow({ children: [lc("来访事由",1000), spanCell(reason, 5, 6400), vc("",800)] }),
      new TableRow({ children: [lc("接待单位",1000), vc("太仓市生物医药产业园有限公司",2400), lc("陪同人员",1000), spanCell(escort, 3, 4000)] }),
      new TableRow({ children: [lc("接待类别",1000), spanCell(mealMap[meal]||mealMap["晚餐"], 3, 2400), lc("接待标准",1000), vc(budget+"元/人",800), vc("",800)] }),
      new TableRow({ children: [lc("其他事项",1000), spanCell("", 5, 6400), vc("",800)] }),
    ]
  });

  var t1 = new Table({
    width: { size: 100, type: WidthType.PERCENTAGE },
    rows: [
      new TableRow({ children: [lc("负责接待单位（单位盖章）",1600), vc("太仓市生物医药产业园有限公司",1600), lc("陪同人员",1000), vc(escort+" 人",1200), vc("",1200), vc("",1200)] }),
      new TableRow({ children: [lc("来访单位",1600), vc(guest,1600), lc("来访人数",1000), vc(guestCount+" 人",1200), vc("",1200), vc("",1200)] }),
      new TableRow({ children: [lc("来访时间",1600), vc(visitDate,1600), lc("是否出具公函",1000), vc("□是  ☑否",1200), vc("",1200), vc("",1200)] }),
      new TableRow({ children: [lc("商务活动内容",1600), spanCell(reason, 5, 6400)] }),
      new TableRow({ children: [lc("发生费用",1600), spanCell("就餐地点："+(venue||"/"), 3, 3600), vc(budget?String(parseFloat(budget)*parseInt(guestCount||"1"))+"元":"/",1200), vc("",1200), vc("",1200)] }),
    ]
  });

  return new Document({ sections: [{
    children: [
      pp("商务接待审批表", 26, "1a3a5c"),
      pp("申请人："+name+"    批准人：    申请日期："+date, 16),
      new Paragraph({}),
      t0,
      new Paragraph({}),
      pp("商务接待清单", 20, "1a3a5c"),
      t1,
    ]
  }] });
}

// ─────────────────────────────────────────
// 下载
// ─────────────────────────────────────────
function downloadBlob(doc, filename) {
  return Packer.toBuffer(doc).then(function(buffer) {
    var blob = new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = filename;
    a.style.display = "none";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
  });
}

async function generateDocs() {
  if (!checkDocx()) return;
  var btn = document.getElementById("generateBtn");
  var result = document.getElementById("result");
  var errBox = document.getElementById("errorMsg");
  var loading = document.getElementById("loading");

  result.classList.remove("show");
  errBox.classList.remove("show");
  btn.disabled = true;
  btn.textContent = "生成中...";
  loading.classList.add("show");

  try {
    var data = {
      name: document.getElementById("name").value.trim(),
      dept: document.getElementById("dept").value.trim(),
      date: document.getElementById("date").value,
      destination: document.getElementById("destination").value.trim(),
      start_date: document.getElementById("start_date").value,
      end_date: document.getElementById("end_date").value,
      participants: document.getElementById("participants").value.trim(),
      days: document.getElementById("days").value.trim(),
      reason: document.getElementById("reason").value.trim(),
      amount: document.getElementById("amount").value.trim(),
      amount_detail: document.getElementById("amount_detail").value.trim(),
      guest_unit: document.getElementById("guest_unit").value.trim(),
      guest_count: document.getElementById("guest_count").value.trim(),
      visit_date: document.getElementById("visit_date").value,
      escort: document.getElementById("escort").value.trim(),
      venue: document.getElementById("venue").value.trim(),
      budget: document.getElementById("budget").value.trim(),
      meal: (document.querySelector('input[name="meal"]:checked')||{value:"晚餐"}).value,
    };

    if (!data.name) throw new Error("请填写姓名");
    if (!data.dept) throw new Error("请填写部门");

    var docs = [
      { doc: make01(data), name: "01出差审批表.docx" },
      { doc: make02(data), name: "02费用报销单.docx" },
      { doc: make02(data), name: "03费用报销单.docx" },
      { doc: make04(data), name: "04商务接待审批表.docx" },
    ];

    for (var i = 0; i < docs.length; i++) {
      await downloadBlob(docs[i].doc, docs[i].name);
      await new Promise(function(r) { setTimeout(r, 300); });
    }

    result.classList.add("show");

  } catch(e) {
    errBox.textContent = "❌ 错误：" + e.message;
    errBox.classList.add("show");
  } finally {
    btn.disabled = false;
    btn.textContent = "🚀 生成 4 份报销文档";
    loading.classList.remove("show");
  }
}
</script>
